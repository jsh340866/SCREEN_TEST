  <style>

    body {

    a {

    .wrapper>header>nav>.search {}

    .wrapper>header>nav>.cancle>a {}

    .wrapper>header>nav>.search>a {}

    .wrapper>main {}

    .wrapper>main>div {}

    .wrapper>footer {}
  </style>
</head>
