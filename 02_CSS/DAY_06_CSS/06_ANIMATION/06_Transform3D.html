<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 150px;
      height: 150px;
      /* background-color: orange; */
      border: 1px solid;

      position: relative;
    }

    .container>.item {
      width: 100%;
      height: 100%;

      position: absolute;
      left: 0;
      top: 0
    }

    .container>.item>.front,
    .container>.item>.back {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid;

      position: absolute;
      left: 0;
      top: 0;
      /*  */
      backface-visibility: hidden;
    }

    .container>.item>.front {
      background-color: orange;
    }

    .container>.item>.back {
      background-color: royalblue;
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="item">
      <div class="front"></div>
      <div class="back"></div>
    </div>
  </div>

</body>

</html>
