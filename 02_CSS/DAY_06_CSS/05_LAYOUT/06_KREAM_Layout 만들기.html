<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <!-- GOOGLE ICON -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    .material-symbols-outlined {
      font-variation-settings:
        'FILL' 0,
        'wght' 200,
        'GRAD' 0,
        'opsz' 24
    }
  </style>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    a {
      text-decoration: none;
      color: black;
    }

    /* layout */
    .layout-1280 {
      width: 1280px;
      margin: 0 auto;
    }

    .wrapper {}

    /* layout-header */
    .wrapper>header {}

    .wrapper>header>.top-header {}

    .wrapper>header>.top-header>ul {
      /* border: 1px solid; */
      display: flex;
      justify-content: right;
    }

    .wrapper>header>.top-header>ul>li {
      /* border: 1px solid; */
      padding: 5px 10px;
    }

    .wrapper>header>.top-header>ul>li:last-child {
      padding-right: 0;
    }

    .wrapper>header>.top-header>ul>li>a {
      display: block;
      font-size: 0.8rem;
      color: gray;
    }

    .wrapper>header>nav {}

    .wrapper>header>nav>.nav-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wrapper>header>nav>.nav-top>.left {}

    .wrapper>header>nav>.nav-top>.left>img {
      width: 120px;
      height: 20px;
    }

    .wrapper>header>nav>.nav-top>.right {
      display: flex;
      /* border: 1px solid; */
      justify-content: space-between;
      /* width: 380px; */
      height: 40px;
      gap: 10px;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-menu {
      width: 100%;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-menu>ul {
      display: flex;
      /* border: 1px solid; */
      align-items: center;
      height: 100%;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-menu>ul>li {
      padding: 5px 10px;
      position: relative;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-menu>ul>li:nth-child(2)::after {
      content: '';
      display: block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background-color: tomato;
      position: absolute;
      top: 6px;
      right: 5px;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-menu>ul>li>a {}

    .wrapper>header>nav>.nav-top>.right>.nav-icon {
      width: 100%;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-icon>ul {
      display: flex;
      /* border: 1px solid; */
      align-items: center;
      justify-content: right;
      height: 100%;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-icon>ul>li {
      padding: 10px;
    }
    .wrapper>header>nav>.nav-top>.right>.nav-icon>ul>li:last-child{
      padding-right: 0;
    }

    .wrapper>header>nav>.nav-top>.right>.nav-icon>ul>li>a {
      display: block;
      /* border: 1px solid; */
    }

    .wrapper>header>nav>.nav-top>.right>.nav-icon>ul>li>a>span {
      font-size: 1.8rem;
    }



    .wrapper>header>nav>.nav-bottom {}

    /* layout-main */
    .wrapper>main {}

    .wrapper>main>section {}

    /* layout-footer */
    .wrapper>footer {}
  </style>
</head>

<body>

  <!-- .wrapper>header>.top-header+nav^main>section^footer -->

  <div class="wrapper layout-1280">
    <header>
      <div class="top-header">
        <ul>
          <li><a href="javascript:void(0)">고객센터</a></li>
          <li><a href="javascript:void(0)">마이페이지</a></li>
          <li><a href="javascript:void(0)">관심</a></li>
          <li><a href="javascript:void(0)">알림</a></li>
          <li><a href="javascript:void(0)">로그인</a></li>
        </ul>
      </div>
      <nav>
        <div class="nav-top">
          <div class="left logo">
            <img src="./logo.svg" alt="">
          </div>
          <div class="right gnb">
            <div class="nav-menu">
              <ul>
                <li><a href="javascript:void(0)">HOME</a></li>
                <li><a href="javascript:void(0)">STYLE</a></li>
                <li><a href="javascript:void(0)">SHOP</a></li>
              </ul>
            </div>
            <div class="nav-icon">
              <ul>
                <li>
                  <a href="javascript:void(0)">
                    <span class="material-symbols-outlined">
                      search
                    </span>
                  </a>
                </li>
                <li>
                  <a href="javascript:void(0)">
                    <span class="material-symbols-outlined">
                      shopping_bag
                    </span>
                  </a>
                </li>
                <li>
                  <a href="javascript:void(0)">
                    <span class="material-symbols-outlined">
                      menu
                    </span>
                  </a>
                </li>

              </ul>
            </div>
          </div>
        </div>
        <div class="nav-bottom"></div>
      </nav>
    </header>
    <main>
      <section></section>
    </main>
    <footer></footer>
  </div>

</body>

</html>
