<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>

</style>


<body>

    <form action="">
        <div>
            <h2>NAVER</h2>
        </div>
        <div>
            <h4>저기요 이용을 위해 네이버에 로그인해 주세요.</h4>
        </div>
        <div>
            <div>여러 사람이 쓰는 PC라면</div>
            <span>1. '로그인 상태 유지'체크하지 않기</span>
            <span>2. 사용 후 로그아웃 하기</span>
        </div>

        <div>
            <label for="">ID/전화번호</label>
            <input type="radio" name="login-type" id=login1 checked />

            <div>
                <label for="">일회용번호</label>
                <input type="radio" name="login-type" />
            </div>
            <div>
                <label for="">QR코드</label>
                <input type="radio" name="login-type" />
            </div>
        </div>


        <div>
            <div>
                <div>
                    <label for="">아이디 또는 전화번호</label>
                    <input type="text" name="userid" />
                </div>
                <div>
                    <label for="">비밀번호</label>
                    <input type="password" name="password" />
                </div>
            </div>
            <div>
                <div>
                    <input type="checkbox" name="" />
                    <label for="">로그인 상태 유지</label>
                </div>
                <div>
                    <label for="">IP보안</label>
                    <input type="checkbox" name="" />
                </div>
            </div>
            <div>
                <button>로그인</button>
            </div>
            <div>
                지문 얼굴 인증을 설정했다면
            </div>
            <div>
                <button>패스키 로그인</button>
            </div>
        </div>


        <div>
            <div>
                <a href="javascript:void(0)">비밀번호 찾기</a>
                <a href="javascript:void(0)">아이디 찾기</a>
                <a href="javascript:void(0)">회원가입</a>
            </div>
            <div>
                <a href="javascript:void(0)">광고</a>
            </div>
        </div>


        <div>
            <div>
                네이버앱의 메뉴 > 설정 > 로그인 아이디 관리 >
                더보기 > 일회용 로그인 번호에 보이는 번호를 입력해 주세요.
            </div>
            <div>
                <label for="">번호를 입력하세요.</label>
                <input type="text" name="" />
            </div>
            <div>
                <button>로그인</button>
            </div>
        </div>


        <div>
            <div>
                <a href="javascript:void(0)">QR코드</a>
            </div>
            <div>
                공용 네트워크, 공용 PC라면 안전을 위해
                QR코드로 로그인해주세요.
            </div>
            <div>
                네이버 앱 > 렌즈 를 눌러 QR코드를 스캔하여
                보이는 숫자 중 59를 선택하면 로그인 됩니다.
            </div>
        </div>






    </form>





</body>

</html>
